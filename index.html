<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="esoteric.win - something new is coming. eventually.">
<meta property="og:title" content="esoteric.win">
<meta property="og:description" content="we have a vision. we have ambition. we do not have a launch date.">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<title>coming soon - esoteric.win</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e0e0e0;font-family:'Share Tech Mono',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center}
.eyebrow{font-size:10px;letter-spacing:4px;color:#444;text-transform:uppercase;margin-bottom:20px}
.title{font-family:'Special Elite',serif;font-size:clamp(36px,9vw,80px);line-height:1.05;margin-bottom:20px}
.title span{color:#888}
.sub{font-size:12px;color:#555;max-width:360px;line-height:1.9;margin-bottom:48px}
.promises{text-align:left;max-width:320px;width:100%;margin-bottom:48px}
.promise{display:flex;gap:14px;font-size:12px;padding:9px 0;border-bottom:1px solid #1a1a1a;color:#777;line-height:1.5}
.promise:last-child{border:none}
.promise .check{color:#888;flex-shrink:0}
.promise .cross{color:#333;flex-shrink:0}
.input-row{display:flex;max-width:340px;width:100%}
input{flex:1;background:#111;border:1px solid #222;border-right:none;color:#e0e0e0;font-family:'Share Tech Mono',monospace;font-size:12px;padding:12px 16px;outline:none}
input::placeholder{color:#333}
input:focus{border-color:#888}
button{background:#888;border:none;color:#0a0a0a;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1px;padding:12px 20px;cursor:pointer;text-transform:uppercase}
button:hover{background:#aaa}
.fine{font-size:10px;color:#2a2a2a;margin-top:12px;letter-spacing:1px}
</style>
</head>
<body>
<div class="eyebrow">esoteric.win · something new</div>
<div class="title">it's coming.<br><span>eventually.</span></div>
<div class="sub">we have a vision. we have ambition.<br>we do not have a launch date.<br>we're working on it though. kind of.</div>
<div class="promises">
<div class="promise"><span class="check">✓</span><span>logo is done</span></div>
<div class="promise"><span class="check">✓</span><span>domain purchased (obviously)</span></div>
<div class="promise"><span class="check">✓</span><span>...</span></div>
<div class="promise"><span class="cross">✗</span><span>anything else</span></div>
</div>
<div class="input-row">
<input type="email" placeholder="your@email.com">
<button onclick="this.textContent='ok 👍';this.style.background='#666'">notify me</button>
</div>
<div class="fine">we'll email you. or forget to. one of those.</div>
</body>
</html>
