
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - percs.fun</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0d0d0d;
  color: #e0e0e0;
  font-family: 'Share Tech Mono', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  text-align: center;
}

.num {
  font-family: 'Special Elite', serif;
  font-size: clamp(100px, 25vw, 200px);
  line-height: 1;
  color: #1a1a1a;
  text-shadow:
    1px 1px 0 #333,
    2px 2px 0 #2a2a2a,
    3px 3px 0 #222;
  letter-spacing: -8px;
  user-select: none;
}

.msg {
  font-size: clamp(14px, 3vw, 20px);
  margin: 24px 0 10px;
  letter-spacing: 1px;
}

.sub {
  font-size: 12px;
  color: #555;
  max-width: 340px;
  line-height: 1.8;
  margin-bottom: 36px;
}

.sub span { color: #888; }

.btn {
  display: inline-block;
  border: 1px solid #333;
  color: #888;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  padding: 11px 28px;
  text-decoration: none;
  text-transform: uppercase;
  transition: color 0.2s, border-color 0.2s;
}

.btn:hover { color: #e0e0e0; border-color: #666; }

.blink {
  animation: blink 1.2s step-end infinite;
  color: #444;
  margin-top: 48px;
  font-size: 11px;
  letter-spacing: 2px;
}

@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
</style>
</head>
<body>

<div class="num">404</div>
<div class="msg">you wandered off somewhere weird.</div>
<div class="sub">
  this page doesn't exist.<br>
  it never existed.<br>
  <span>we're not even sure YOU exist at this point.</span>
</div>
<a class="btn" href="/">take me home</a>
<div class="blink">_ _ _ _ _ _ _ _ _ _</div>

</body>
</html>
